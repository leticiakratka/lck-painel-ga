name: Atualiza painel GA4

on:
  schedule:
    - cron: '30 10 * * *'   # 10:30 UTC = 7:30 de Brasilia, todo dia
  workflow_dispatch:          # botao para rodar manualmente quando quiser

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixa o repositorio
        uses: actions/checkout@v4

      - name: Instala Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instala dependencias
        run: pip install --quiet google-auth requests

      - name: Gera o painel
        env:
          GA_SA_JSON: ${{ secrets.GA_SA_JSON }}
          PAINEL_OUT: painel-95babd02.html
        run: python gera_painel.py

      - name: Publica (commit + push)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Atualiza painel (GitHub Actions)"
          git push
